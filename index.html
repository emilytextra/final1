<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Inventory Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #add8e6; /* Light blue background */
    }

    .container {
      width: 80%;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }

    h1 {
      text-align: center;
    }

    .menu-bar {
      display: flex;
      justify-content: center;
      background-color: #007bff;
      padding: 10px;
    }

    .menu-bar a {
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      font-size: 18px;
      text-align: center;
      border-radius: 4px;
      margin-left: 5px;
    }

    .menu-bar a:hover {
      background-color: #0056b3;
    }

    form {
      margin-bottom: 20px;
    }

    label {
      margin-right: 10px;
    }

    input[type="text"],
    input[type="number"] {
      padding: 8px;
      margin-right: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 8px 16px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .clear-button {
      background-color: #d9534f;
      margin-top: 20px;
    }

    .clear-button:hover {
      background-color: #b52b27;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>
<body>
  <div class="menu-bar">
    <a href="index.html">Dashboard</a>
    <a href="about.html">About</a>
    <a href="profile.html">Profile</a>
  </div>

  <div class="container">
    <h1>Warehouse Inventory Dashboard</h1>

    <form id="addItemForm">
      <label for="itemName">Item Name:</label>
      <input type="text" id="itemName" name="itemName" placeholder="Enter item name" required>
      
      <label for="itemQuantity">Quantity:</label>
      <input type="number" id="itemQuantity" name="itemQuantity" placeholder="Enter quantity" required>
      
      <button type="submit">Add Item</button>
    </form>

    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>

    <button id="clearAllButton" class="clear-button">Clear All Items</button>
  </div>

  <script>
    const form = document.getElementById('addItemForm');
    const tableBody = document.querySelector('#inventoryTable tbody');
    const clearAllButton = document.getElementById('clearAllButton');

    const savedItems = JSON.parse(localStorage.getItem('items')) || [];
    const savedQuantities = JSON.parse(localStorage.getItem('quantities')) || [];
    renderTable(savedItems, savedQuantities);

    function renderTable(items, quantities) {
      tableBody.innerHTML = '';
      items.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${item}</td><td>${quantities[index]}</td>`;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const itemName = document.getElementById('itemName').value;
      const itemQuantity = parseInt(document.getElementById('itemQuantity').value, 10);

      savedItems.push(itemName);
      savedQuantities.push(itemQuantity);

      localStorage.setItem('items', JSON.stringify(savedItems));
      localStorage.setItem('quantities', JSON.stringify(savedQuantities));
      renderTable(savedItems, savedQuantities);

      form.reset();
    });

    clearAllButton.addEventListener('click', () => {
      localStorage.removeItem('items');
      localStorage.removeItem('quantities');
      renderTable([], []);
    });
  </script>
</body>
</html>
